<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$XPAY :: INITIALIZING...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00ff41;
      --secondary: #00ffff;
      --accent: #ff00ff;
      --bg: #000000;
      --surface: #0a0a0a;
    }

    body {
      background: var(--bg);
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      cursor: crosshair;
    }

    /* CRT Effect */
    .crt::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .crt::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0, 255, 65, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 9998;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9997;
    }

    /* Particle Canvas */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Glitch Title */
    .glitch-wrapper {
      position: relative;
      margin-bottom: 40px;
    }

    .glitch {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(48px, 12vw, 120px);
      font-weight: 900;
      letter-spacing: -2px;
      position: relative;
      color: var(--primary);
      text-shadow: 
        0 0 10px var(--primary),
        0 0 20px var(--primary),
        0 0 40px var(--primary);
      animation: glitch-skew 3s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .glitch::before {
      color: var(--accent);
      animation: glitch-1 2s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(-2px, -2px);
    }

    .glitch::after {
      color: var(--secondary);
      animation: glitch-2 2s infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translate(2px, 2px);
    }

    @keyframes glitch-1 {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(3px, -3px); }
      60% { transform: translate(-3px, -3px); }
      80% { transform: translate(3px, 3px); }
    }

    @keyframes glitch-2 {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(3px, -3px); }
      40% { transform: translate(-3px, 3px); }
      60% { transform: translate(3px, 3px); }
      80% { transform: translate(-3px, -3px); }
    }

    @keyframes glitch-skew {
      0%, 100% { transform: skew(0deg); }
      10% { transform: skew(-2deg); }
      20% { transform: skew(2deg); }
      30% { transform: skew(0deg); }
    }

    /* Subtitle */
    .subtitle {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 60px;
      opacity: 0.8;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.3; }
    }

    /* Terminal Window */
    .terminal {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--primary);
      box-shadow: 
        0 0 20px rgba(0, 255, 65, 0.2),
        inset 0 0 20px rgba(0, 255, 65, 0.05);
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    .terminal::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .terminal-header {
      background: rgba(0, 255, 65, 0.1);
      padding: 12px 20px;
      border-bottom: 1px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .terminal-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid;
    }

    .dot-red { border-color: #ff0040; background: rgba(255, 0, 64, 0.3); }
    .dot-yellow { border-color: #ffff00; background: rgba(255, 255, 0, 0.3); }
    .dot-green { border-color: var(--primary); background: rgba(0, 255, 65, 0.3); }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .terminal-body {
      padding: 25px;
      min-height: 200px;
      font-size: 13px;
      line-height: 1.8;
    }

    .log-line {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
      margin-bottom: 4px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .log-success { color: var(--primary); }
    .log-info { color: var(--secondary); }
    .log-warn { color: #ffff00; }
    .log-error { color: #ff0040; }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: var(--primary);
      animation: cursor-blink 1s infinite;
      vertical-align: middle;
      margin-left: 4px;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      max-width: 700px;
      margin-bottom: 30px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid var(--primary);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 0%;
      transition: width 0.5s ease;
      box-shadow: 0 0 20px var(--primary);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, transparent, white);
      animation: progress-shine 2s infinite;
    }

    @keyframes progress-shine {
      0% { transform: translateX(-20px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(20px); opacity: 0; }
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary);
      min-width: 80px;
    }

    .countdown-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--secondary);
      margin-top: 5px;
    }

    /* Social Links */
    .socials {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .social-link {
      padding: 12px 30px;
      border: 1px solid var(--primary);
      color: var(--primary);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--primary);
      transition: left 0.3s;
      z-index: -1;
    }

    .social-link:hover {
      color: var(--bg);
    }

    .social-link:hover::before {
      left: 0;
    }

    /* Mouse follower */
    .mouse-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .countdown {
        gap: 15px;
      }
      .countdown-value {
        font-size: 32px;
        min-width: 60px;
      }
      .socials {
        flex-direction: column;
        width: 100%;
        max-width: 300px;
      }
      .social-link {
        text-align: center;
      }
    }

    /* Loading complete state */
    .complete .glitch {
      color: var(--secondary);
      text-shadow: 
        0 0 10px var(--secondary),
        0 0 20px var(--secondary),
        0 0 40px var(--secondary);
    }

    .complete .progress-fill {
      background: var(--secondary);
      box-shadow: 0 0 20px var(--secondary);
    }

    .enter-btn {
      margin-top: 30px;
      padding: 18px 50px;
      background: var(--primary);
      color: var(--bg);
      border: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.9);
      animation: enter-appear 0.5s forwards;
      animation-delay: 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    @keyframes enter-appear {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .enter-btn:hover {
      box-shadow: 0 0 40px var(--primary);
      transform: scale(1.05);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="crt">
  <div class="scanlines"></div>
  <div class="mouse-glow" id="mouseGlow"></div>
  <canvas id="particles"></canvas>

  <div class="container">
    <div style="margin-bottom: 20px;">
      <img src="logo.jpg" alt="XPAY" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 30px var(--primary);">
    </div>
    <div class="glitch-wrapper">
      <div class="glitch" data-text="$XPAY">$XPAY</div>
    </div>
    
    <div class="subtitle" id="subtitle">INITIALIZING PROTOCOL...</div>

    <div class="terminal">
      <div class="terminal-header">
        <span class="terminal-dot dot-red"></span>
        <span class="terminal-dot dot-yellow"></span>
        <span class="terminal-dot dot-green"></span>
        <span class="terminal-title">SYSTEM_INIT.exe — 80×24</span>
      </div>
      <div class="terminal-body" id="terminal">
        <!-- Logs will be inserted here -->
      </div>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-label">
        <span>SYSTEM_LOAD</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <div class="countdown-value" id="days">00</div>
        <div class="countdown-label">Days</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value" id="hours">00</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value" id="minutes">00</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-item">
        <div class="countdown-value" id="seconds">00</div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>

    <div class="socials" id="socials">
      <a href="https://twitter.com/xpay" target="_blank" class="social-link">Twitter</a>
      <a href="https://github.com/XPAYX-ORG/xpay-bot" target="_blank" class="social-link">GitHub</a>
      <a href="https://discord.gg/xpay" target="_blank" class="social-link">Discord</a>
    </div>

    <a href="/dashboard" class="enter-btn hidden" id="enterBtn">[ ENTER_SYSTEM ]</a>
  </div>

  <script>
    // Terminal logs
    const logs = [
      { text: 'BIOS Date: 03/12/26 18:42:17 Ver 2.0.0', type: 'info', delay: 0 },
      { text: 'CPU: Solana Virtual Machine @ 65,000 TPS', type: 'info', delay: 100 },
      { text: 'Memory Test: 16777216K OK', type: 'success', delay: 200 },
      { text: 'Initializing neural handshake...', type: 'info', delay: 400 },
      { text: 'Detecting RPC nodes...', type: 'info', delay: 600 },
      { text: 'Primary RPC: https://api.mainnet-beta.solana.com [ONLINE]', type: 'success', delay: 800 },
      { text: 'Secondary RPC: https://rpc.helius.xyz [ONLINE]', type: 'success', delay: 1000 },
      { text: 'Loading smart contracts...', type: 'info', delay: 1200 },
      { text: '✓ Rain Distribution Contract v1.0 loaded', type: 'success', delay: 1400 },
      { text: '✓ Escrow Wallet initialized', type: 'success', delay: 1600 },
      { text: 'Connecting to Supabase...', type: 'info', delay: 1800 },
      { text: '✓ Database connection established', type: 'success', delay: 2000 },
      { text: 'Initializing Twitter API stream...', type: 'info', delay: 2200 },
      { text: '✓ Stream connected', type: 'success', delay: 2400 },
      { text: 'Queue system: ONLINE', type: 'success', delay: 2600 },
      { text: 'Anti-bot filters: ACTIVE', type: 'success', delay: 2800 },
      { text: 'Rain distribution: READY', type: 'success', delay: 3000 },
      { text: 'Encryption keys: GENERATED', type: 'success', delay: 3200 },
      { text: 'Security protocols: ARMED', type: 'warn', delay: 3400 },
      { text: '', type: 'info', delay: 3600 },
      { text: '================================', type: 'info', delay: 3800 },
      { text: 'SYSTEM READY', type: 'success', delay: 4000 },
      { text: '================================', type: 'info', delay: 4200 },
    ];

    const terminal = document.getElementById('terminal');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    let progress = 0;

    // Type logs
    logs.forEach((log, index) => {
      setTimeout(() => {
        const line = document.createElement('div');
        line.className = `log-line log-${log.type}`;
        
        if (log.text) {
          line.textContent = `> ${log.text}`;
        } else {
          line.innerHTML = '&nbsp;';
        }
        
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;

        // Update progress
        progress = ((index + 1) / logs.length) * 100;
        progressFill.style.width = `${progress}%`;
        progressPercent.textContent = `${Math.floor(progress)}%`;

        // Add cursor to last line
        if (index === logs.length - 1) {
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          line.appendChild(cursor);

          // Complete loading
          setTimeout(() => {
            document.body.classList.add('complete');
            document.getElementById('subtitle').textContent = 'SYSTEM ONLINE';
            document.getElementById('enterBtn').classList.remove('hidden');
            document.getElementById('countdown').classList.add('hidden');
            document.getElementById('socials').classList.add('hidden');
            document.getElementById('progressContainer').classList.add('hidden');
          }, 1000);
        }
      }, log.delay);
    });

    // Countdown timer (set target date)
    const targetDate = new Date('2026-03-15T00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance > 0) {
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById('days').textContent = String(days).padStart(2, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
      }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // Particle system
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const particles = [];
    const particleCount = 100;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5;
        this.color = Math.random() > 0.5 ? '#00ff41' : '#00ffff';
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      // Draw connections
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const distance = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          if (distance < 100) {
            ctx.strokeStyle = '#00ff41';
            ctx.globalAlpha = 0.1 * (1 - distance / 100);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          }
        });
      });

      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Mouse glow effect
    const mouseGlow = document.getElementById('mouseGlow');
    document.addEventListener('mousemove', (e) => {
      mouseGlow.style.left = e.clientX + 'px';
      mouseGlow.style.top = e.clientY + 'px';
    });

    // Click effects
    document.addEventListener('click', (e) => {
      const ripple = document.createElement('div');
      ripple.style.cssText = `
        position: fixed;
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        width: 10px;
        height: 10px;
        border: 2px solid #00ff41;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        animation: ripple 0.6s ease-out;
      `;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    // Add ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        to {
          width: 100px;
          height: 100px;
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
