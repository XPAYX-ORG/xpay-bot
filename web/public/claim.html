<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAIM :: $XPAY</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #050505;
      --bg-secondary: #0a0a0a;
      --bg-tertiary: #111111;
      --terminal-green: #00ff41;
      --terminal-cyan: #00ffff;
      --terminal-yellow: #ffff00;
      --terminal-red: #ff0040;
      --text-primary: #e0e0e0;
      --text-secondary: #888888;
      --border: #222222;
    }
    
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 1000;
    }
    
    .terminal {
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    
    .terminal-header {
      background: var(--bg-tertiary);
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    
    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .terminal-dot.red { background: var(--terminal-red); }
    .terminal-dot.yellow { background: var(--terminal-yellow); }
    .terminal-dot.green { background: var(--terminal-green); }
    
    .terminal-body {
      padding: 40px;
      text-align: center;
    }
    
    .rain-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 20px;
      color: var(--terminal-green);
      margin-bottom: 10px;
    }
    
    .amount {
      font-size: 48px;
      font-weight: 700;
      color: var(--terminal-green);
      margin-bottom: 5px;
    }
    
    .token {
      font-size: 18px;
      color: var(--terminal-cyan);
      margin-bottom: 30px;
    }
    
    .info {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 30px;
      line-height: 1.8;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      border: 1px solid var(--terminal-green);
      background: transparent;
      color: var(--terminal-green);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    
    .btn:hover {
      background: var(--terminal-green);
      color: var(--bg-primary);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      font-size: 12px;
    }
    
    .status.success {
      border-color: var(--terminal-green);
      color: var(--terminal-green);
    }
    
    .status.error {
      border-color: var(--terminal-red);
      color: var(--terminal-red);
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--terminal-green);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .wallet-select {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .wallet-btn {
      padding: 15px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .wallet-btn:hover {
      border-color: var(--terminal-green);
      color: var(--terminal-green);
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="terminal-dot red"></span>
      <span class="terminal-dot yellow"></span>
      <span class="terminal-dot green"></span>
      <span>CLAIM_PROTOCOL.exe</span>
    </div>
    <div class="terminal-body">
      <div class="rain-icon">🌧</div>
      <h1>RAIN_CLAIM_READY</h1>
      
      <div class="amount" id="amount">1000</div>
      <div class="token" id="token">$XPAY</div>
      
      <div class="info" id="info">
        Connect your wallet to claim your tokens.<br>
        Gas fees are covered by the sender.
      </div>
      
      <div class="wallet-select" id="wallet-select">
        <button class="wallet-btn" onclick="connectPhantom()">👻<br>Phantom</button>
        <button class="wallet-btn" onclick="connectBackpack()">🎒<br>Backpack</button>
        <button class="wallet-btn" onclick="connectSolflare()">☀️<br>Solflare</button>
      </div>
      
      <button class="btn" id="claim-btn" onclick="claim()" style="display: none;">
        [EXECUTE_CLAIM]
      </button>
      
      <div class="status" id="status" style="display: none;"></div>
    </div>
  </div>

  <script>
    let wallet = null;
    let claimData = null;
    
    // Get rain ID from URL
    const path = window.location.pathname;
    const rainId = path.split('/').pop();
    
    async function loadClaim() {
      // Fetch claim data from API
      // const response = await fetch(`/api/claims/${rainId}`);
      // claimData = await response.json();
      
      // Simulated data
      claimData = {
        amount: 1000,
        token: 'XPAY',
        status: 'pending'
      };
      
      document.getElementById('amount').textContent = claimData.amount;
      document.getElementById('token').textContent = '$' + claimData.token;
    }
    
    async function connectPhantom() {
      if (!window.phantom?.solana) {
        alert('Install Phantom from phantom.app');
        return;
      }
      try {
        await window.phantom.solana.connect();
        wallet = window.phantom.solana;
        showClaimButton();
      } catch (e) {
        console.error(e);
      }
    }
    
    async function connectBackpack() {
      if (!window.backpack?.solana) {
        alert('Install Backpack from backpack.app');
        return;
      }
      try {
        await window.backpack.solana.connect();
        wallet = window.backpack.solana;
        showClaimButton();
      } catch (e) {
        console.error(e);
      }
    }
    
    async function connectSolflare() {
      if (!window.solflare) {
        alert('Install Solflare from solflare.com');
        return;
      }
      try {
        await window.solflare.connect();
        wallet = window.solflare;
        showClaimButton();
      } catch (e) {
        console.error(e);
      }
    }
    
    function showClaimButton() {
      document.getElementById('wallet-select').style.display = 'none';
      document.getElementById('info').innerHTML = 
        `Connected: ${wallet.publicKey.toString().slice(0, 8)}...${wallet.publicKey.toString().slice(-8)}`;
      document.getElementById('claim-btn').style.display = 'block';
    }
    
    async function claim() {
      const btn = document.getElementById('claim-btn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> PROCESSING...';
      
      try {
        // Call claim API
        // const response = await fetch('/api/claim', {
        //   method: 'POST',
        //   body: JSON.stringify({ rainId, wallet: wallet.publicKey.toString() })
        // });
        
        // Simulate delay
        await new Promise(r => setTimeout(r, 2000));
        
        status.style.display = 'block';
        status.className = 'status success';
        status.innerHTML = `
          ✓ CLAIM EXECUTED SUCCESSFULLY<br>
          Transaction: 0x7a3f...9e2d<br>
          <a href="https://solscan.io/tx/..." target="_blank" style="color: var(--terminal-cyan);">View on Solscan →</a>
        `;
        
        btn.style.display = 'none';
      } catch (error) {
        status.style.display = 'block';
        status.className = 'status error';
        status.textContent = '✗ CLAIM FAILED: ' + error.message;
        btn.disabled = false;
        btn.textContent = '[EXECUTE_CLAIM]';
      }
    }
    
    loadClaim();
  </script>

  <footer style="position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid #222; background: #0a0a0a; padding: 20px; text-align: center;">
    <div style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
      <a href="https://x.com/Xpay_rain" target="_blank" style="color: #888; text-decoration: none; font-size: 12px;">[X/TWITTER]</a>
      <a href="https://github.com/XPAYX-ORG/xpay-bot" target="_blank" style="color: #888; text-decoration: none; font-size: 12px;">[GITHUB]</a>
      <a href="/" style="color: #888; text-decoration: none; font-size: 12px;">[HOME]</a>
    </div>
  </footer>
</body>
</html>
